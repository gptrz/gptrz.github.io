<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Tabla de Schulte GPTRZ</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0d0d0d;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    h1 { color: #00ff88; }
    .controls {
      margin-bottom: 20px;
    }
    input, button {
      padding: 8px;
      margin: 5px;
      border-radius: 6px;
      border: none;
      font-size: 14px;
    }
    button {
      background: #00aaff;
      color: #fff;
      cursor: pointer;
    }
    button:hover { background: #0077cc; }
    .grid {
      display: grid;
      gap: 8px;
      margin-top: 20px;
    }
    .cell {
      background: #222;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 20px;
      font-weight: bold;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.3s;
      width: 60px;
      height: 60px;
    }
    .cell.correct { background: #00ff88; color: #000; }
    .cell.wrong { background: #ff4444; }
    .timer, .target, .stats {
      font-size: 18px;
      margin-top: 10px;
    }
    .timer { color: #ffdd00; }
    .target { color: #00ff88; }
    .stats { color: #00aaff; }
  </style>
</head>
<body>
  <h1>Tabla de Schulte GPTRZ</h1>
  <div class="controls">
    <label>Tamaño (n × n): <input type="number" id="size" value="4" min="3" max="10"></label>
    <label>Tiempo (segundos): <input type="number" id="time" value="60" min="10"></label>
    <button onclick="startGame()">Iniciar</button>
  </div>
  <div class="timer" id="timer">Tiempo restante: 0</div>
  <div class="target" id="target">Número objetivo: -</div>
  <div class="stats" id="stats">Aciertos: 0 | Errores: 0</div>
  <div class="grid" id="grid"></div>

  <!-- Sonidos -->
  <audio id="soundError" src="https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg"></audio>
  <audio id="soundCorrect" src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg"></audio>
  <audio id="soundEnd" src="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg"></audio>

  <script>
    let countdown, currentTarget, remaining, aciertos, errores;

    function startGame() {
      const size = parseInt(document.getElementById('size').value);
      const time = parseInt(document.getElementById('time').value);
      const grid = document.getElementById('grid');
      grid.innerHTML = '';
      grid.style.gridTemplateColumns = `repeat(${size}, 60px)`;
      grid.style.gridTemplateRows = `repeat(${size}, 60px)`;

      // Generar números aleatorios
      let numbers = Array.from({length: size*size}, (_, i) => i+1);
      numbers.sort(() => Math.random() - 0.5);

      numbers.forEach(num => {
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.textContent = num;
        cell.onclick = () => checkNumber(cell, num);
        grid.appendChild(cell);
      });

      // Inicializar juego
      currentTarget = 1;
      aciertos = 0;
      errores = 0;
      document.getElementById('target').textContent = `Número objetivo: ${currentTarget}`;
      document.getElementById('stats').textContent = `Aciertos: ${aciertos} | Errores: ${errores}`;
      clearInterval(countdown);
      remaining = time;
      document.getElementById('timer').textContent = `Tiempo restante: ${remaining}`;
      countdown = setInterval(() => {
        remaining--;
        document.getElementById('timer').textContent = `Tiempo restante: ${remaining}`;
        if (remaining <= 0) {
          clearInterval(countdown);
          document.getElementById('soundEnd').play();
          alert(`¡Tiempo terminado! Aciertos: ${aciertos}, Errores: ${errores}`);
        }
      }, 1000);
    }

    function checkNumber(cell, num) {
      if (num === currentTarget) {
        cell.classList.add('correct');
        document.getElementById('soundCorrect').play();
        aciertos++;
        currentTarget++;
        document.getElementById('stats').textContent = `Aciertos: ${aciertos} | Errores: ${errores}`;
        if (currentTarget > document.querySelectorAll('.cell').length) {
          clearInterval(countdown);
          document.getElementById('soundEnd').play();
          alert(`¡Has completado la tabla! Aciertos: ${aciertos}, Errores: ${errores}`);
        } else {
          document.getElementById('target').textContent = `Número objetivo: ${currentTarget}`;
        }
      } else {
        cell.classList.add('wrong');
        errores++;
        remaining -= 5;
        if (remaining < 0) remaining = 0;
        document.getElementById('timer').textContent = `Tiempo restante: ${remaining}`;
        document.getElementById('stats').textContent = `Aciertos: ${aciertos} | Errores: ${errores}`;
        document.getElementById('soundError').play();
      }
    }
  </script>
</body>
</html>
