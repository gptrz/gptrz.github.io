<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Tabla de Schulte GPTRZ</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0d0d0d;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
      margin: 0;
      padding-top: 30px;
    }
    h1 { color: #00ff88; margin-bottom: 10px; }
    .controls { margin-bottom: 20px; }
    input, button {
      padding: 8px;
      margin: 5px;
      border-radius: 6px;
      border: none;
      font-size: 14px;
    }
    button {
      background: #00aaff;
      color: #fff;
      cursor: pointer;
    }
    button:hover { background: #0077cc; }

    /* Temporizador circular con puntitos */
    .timer-container {
      position: relative;
      width: 160px;
      height: 160px;
      margin: 20px 0;
    }
    .dot {
      width: 8px;
      height: 8px;
      background: #00ff88;
      border-radius: 50%;
      position: absolute;
      transform-origin: 72px 72px;
      transition: background 0.3s;
    }
    .dot.off { background: #333; }
    .timer-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 36px;
      font-weight: bold;
      background: linear-gradient(90deg, #00ff88, #00c6ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      transition: color 0.5s, background 0.5s;
    }
    .target {
      font-size: 24px;
      margin: 10px 0;
      color: #00ff88;
    }
    .grid {
      display: grid;
      gap: 8px;
      margin-top: 20px;
    }
    .cell {
      background: #222;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 20px;
      font-weight: bold;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.3s;
      width: 60px;
      height: 60px;
    }
    .cell.correct { background: #00ff88; color: #000; }
    .cell.wrong { background: #ff4444; }
  </style>
</head>
<body>
  <h1>Tabla de Schulte GPTRZ</h1>
  <div class="controls">
    <label>Tamaño (n × n): <input type="number" id="size" value="4" min="3" max="10"></label>
    <label>Tiempo (segundos): <input type="number" id="time" value="30" min="10"></label>
    <button onclick="startGame()">Iniciar</button>
  </div>

  <!-- Temporizador circular -->
  <div class="timer-container" id="timerContainer">
    <div class="timer-text" id="timer">0</div>
  </div>

  <div class="target" id="target">Objetivo: -</div>
  <div class="grid" id="grid"></div>

  <!-- Sonidos -->
  <audio id="soundError" src="https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg" preload="auto"></audio>
  <audio id="soundCorrect" src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg" preload="auto"></audio>
  <audio id="soundEnd" src="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg" preload="auto"></audio>

  <script>
    let countdown, currentTarget, remaining, totalTime;

    function createDots(total) {
      const container = document.getElementById('timerContainer');
      [...container.querySelectorAll('.dot')].forEach(d => d.remove());
      for (let i = 0; i < total; i++) {
        const dot = document.createElement('div');
        dot.className = 'dot';
        const angle = (i / total) * 360;
        dot.style.transform = `rotate(${angle}deg) translate(72px)`;
        container.appendChild(dot);
      }
    }

    function startGame() {
      const size = parseInt(document.getElementById('size').value);
      totalTime = parseInt(document.getElementById('time').value);
      const grid = document.getElementById('grid');
      grid.innerHTML = '';
      grid.style.gridTemplateColumns = `repeat(${size}, 60px)`;
      grid.style.gridTemplateRows = `repeat(${size}, 60px)`;

      // Generar números aleatorios
      let numbers = Array.from({length: size*size}, (_, i) => i+1);
      numbers.sort(() => Math.random() - 0.5);

      numbers.forEach(num => {
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.textContent = num;
        cell.onclick = () => checkNumber(cell, num);
        grid.appendChild(cell);
      });

      // Inicializar juego
      currentTarget = 1;
      document.getElementById('target').textContent = `Objetivo: ${currentTarget}`;
      clearInterval(countdown);
      remaining = totalTime;
      createDots(totalTime);
      updateTimerUI();
      countdown = setInterval(() => {
        remaining--;
        updateTimerUI();
        if (remaining <= 0) {
          clearInterval(countdown);
          playSound('soundEnd');
          alert("¡Tiempo terminado!");
        }
      }, 1000);
    }

    function checkNumber(cell, num) {
      if (num === currentTarget) {
        cell.classList.add('correct');
        playSound('soundCorrect');
        currentTarget++;
        if (currentTarget > document.querySelectorAll('.cell').length) {
          clearInterval(countdown);
          playSound('soundEnd');
          alert("¡Has completado la tabla!");
        } else {
          document.getElementById('target').textContent = `Objetivo: ${currentTarget}`;
        }
      } else {
        cell.classList.add('wrong');
        remaining -= 5;
        if (remaining < 0) remaining = 0;
        updateTimerUI();
        playSound('soundError');
      }
    }

    function updateTimerUI() {
      document.getElementById('timer').textContent = remaining;
      const dots = document.querySelectorAll('.dot');
      dots.forEach((dot, i) => {
        if (i >= remaining) {
          dot.classList.add('off');
        } else {
          dot.classList.remove('off');
        }
      });

      // Cambiar color del número central según tiempo
      const ratio = remaining / totalTime;
      const timerText = document.getElementById('timer');
      if (ratio > 0.6) {
        timerText.style.background = "linear-gradient(90deg, #00ff88, #00c6ff)";
      } else if (ratio > 0.3) {
        timerText.style.background = "linear-gradient(90deg, #ffdd00, #ffaa00)";
      } else {
        timerText.style.background = "linear-gradient(90deg, #ff4444, #ff0000)";
      }
      timerText.style.webkitBackgroundClip = "text";
      timerText.style.webkitTextFillColor = "transparent";
    }

    function playSound(id) {
      const sound = document.getElementById(id);
      sound.currentTime = 0;
      sound.play();
    }
  </script>
</body>
</html>
