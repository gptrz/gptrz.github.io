<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Bot de Gestión Manual Binarias</title>
  <style>
    body {
      background: #0d0d0d;
      color: #00ff99;
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      padding: 0;
    }
    header {
      background: #111;
      padding: 15px;
      text-align: center;
      border-bottom: 2px solid #00ccff;
    }
    header h1 { margin: 0; color: #00ff99; }
    header h2 { margin: 0; color: #00ccff; }
    .platform-buttons { text-align: center; margin: 15px; }
    .platform-buttons button {
      background: #00ccff; border: none; padding: 10px 20px; margin: 5px;
      color: #fff; font-weight: bold; border-radius: 5px; cursor: pointer;
    }
    .platform-buttons button:hover { background: #0099cc; }
    .container { padding: 20px; }
    .card {
      background: #1a1a1a; border: 1px solid #00ff99; border-radius: 8px;
      padding: 15px; margin-bottom: 15px; box-shadow: 0 0 10px #00ccff;
    }
    .card h3 { margin-top: 0; color: #00ccff; }
    input, select, textarea {
      background: #0d0d0d; color: #00ff99; border: 1px solid #00ccff;
      padding: 5px; margin: 5px 0; border-radius: 5px; width: 100%;
    }
    button.action {
      background: #00ff99; color: #000; font-weight: bold; padding: 8px 12px;
      border: none; border-radius: 5px; cursor: pointer; margin-top: 10px;
    }
    button.action:hover { background: #00ccff; color: #fff; }
  </style>
</head>
<body>
  <header>
    <h1>BOT DE GESTIÓN MANUAL BINARIAS</h1>
    <h2>Rolando Style 😎</h2>
  </header>

  <!-- Botones de plataforma -->
  <div class="platform-buttons">
    <button onclick="setPlataforma('Exnova')">Exnova</button>
    <button onclick="setPlataforma('IQ Option')">IQ Option</button>
  </div>

  <!-- Navegación de días -->
  <div class="platform-buttons">
    <h2>📅 Seleccionar Día</h2>
    <div id="listaDias"></div>
    <button onclick="mostrarTodosDias()">Mostrar todo</button>
  </div>

  <div class="container" id="operacionesContainer">
    <!-- Aquí se van creando las cards de operaciones -->
  </div>
<script>
  let plataforma = "Exnova";
  let dias = {};

  function setPlataforma(nombre) {
    plataforma = nombre;
    alert("Plataforma seleccionada: " + nombre);
  }

  function nuevaOperacion(dia) {
    if (!dias[dia]) dias[dia] = [];
    let idx = dias[dia].length + 1;

    let card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <h3>Operación ${idx} - Día ${dia} (${plataforma})</h3>
      Fecha: <input type="date" id="fecha${dia}_${idx}"><br>
      Hora: <input type="time" id="hora${dia}_${idx}"><br>
      Par: <input type="text" id="par${dia}_${idx}" placeholder="EUR/USD"><br>
      Estrategia: <input type="text" id="estrategia${dia}_${idx}" placeholder="3 velas lateral"><br>
      Señal: <select id="senal${dia}_${idx}">
        <option value="CALL">CALL</option>
        <option value="PUT">PUT</option>
      </select><br>
      Resultado: <select id="resultado${dia}_${idx}">
        <option value="G">Ganancia</option>
        <option value="P">Pérdida</option>
      </select><br>
      Comentario: <textarea id="comentario${dia}_${idx}"></textarea><br>
      Captura: <input type="file" id="captura${dia}_${idx}" accept="image/*"><br>
      <button class="action" onclick="guardarOperacion(${dia}, ${idx})">Guardar Operación</button>
    `;
    document.getElementById("operacionesContainer").appendChild(card);
  }

  function guardarOperacion(dia, idx) {
    if (!dias[dia]) dias[dia] = [];
    dias[dia].push({
      fecha: document.getElementById(`fecha${dia}_${idx}`).value,
      hora: document.getElementById(`hora${dia}_${idx}`).value,
      par: document.getElementById(`par${dia}_${idx}`).value,
      estrategia: document.getElementById(`estrategia${dia}_${idx}`).value,
      senal: document.getElementById(`senal${dia}_${idx}`).value,
      resultado: document.getElementById(`resultado${dia}_${idx}`).value,
      comentario: document.getElementById(`comentario${dia}_${idx}`).value,
      captura: document.getElementById(`captura${dia}_${idx}`).files[0]?.name || "Sin captura",
      plataforma: plataforma
    });
    alert("Operación guardada en Día " + dia + " (" + plataforma + ")");
  }
  function actualizarListaDias() {
    let html = "";
    for (let i=1; i<=9; i++) {
      html += `<button onclick="cargarDia(${i})">Día ${i}</button>`;
    }
    document.getElementById("listaDias").innerHTML = html;
  }

  function mostrarTodosDias() {
    let html = "";
    for (let i=1; i<=30; i++) {
      html += `<button onclick="cargarDia(${i})">Día ${i}</button>`;
    }
    document.getElementById("listaDias").innerHTML = html;
  }

  function cargarDia(dia) {
    document.getElementById("operacionesContainer").innerHTML = "";
    if (!dias[dia]) dias[dia] = [];
    nuevaOperacion(dia);
    alert("Día " + dia + " cargado.");
  }

  function guardarDia(dia) {
    localStorage.setItem("dia_" + dia, JSON.stringify(dias[dia]));
    alert("Día " + dia + " guardado correctamente.");
  }

  function borrarDia(dia) {
    delete dias[dia];
    localStorage.removeItem("dia_" + dia);
    document.getElementById("operacionesContainer").innerHTML = "";
    alert("Día " + dia + " borrado.");
  }

  function verHistorial() {
    let historial = "";
    for (let dia in dias) {
      historial += "📅 Día " + dia + "\n";
      dias[dia].forEach((op, idx) => {
        historial += `${idx+1}. ${op.fecha} ${op.hora} ${op.par} ${op.estrategia} ${op.senal} ${op.resultado} (${op.plataforma})\nComentario: ${op.comentario}\nCaptura: ${op.captura}\n\n`;
      });
    }
    alert(historial || "No hay historial registrado.");
  }

  function exportarCSV() {
    let filas = ["Dia,Fecha,Hora,Par,Estrategia,Señal,Resultado,Comentario,Captura,Plataforma"];
    for (let dia in dias) {
      dias[dia].forEach(op => {
        filas.push(`${dia},${op.fecha},${op.hora},${op.par},${op.estrategia},${op.senal},${op.resultado},${op.comentario},${op.captura},${op.plataforma}`);
      });
    }
    let contenido = filas.join("\n");
    let blob = new Blob([contenido], { type: "text/csv" });
    let url = URL.createObjectURL(blob);
    let a = document.createElement("a");
    a.href = url;
    a.download = "diario_trading.csv";
    a.click();
    URL.revokeObjectURL(url);
  }

  window.onload = actualizarListaDias;
</script>
</body>
</html>
