<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Gestión de Riesgo GPTRZ</title>
  <style>
    body {
      background: #0a0a0a;
      color: #00ffcc;
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      padding: 0;
      text-align: center;
    }
    h1 {
      font-size: 32px;
      color: #00ffcc;
      text-shadow: 0 0 15px #00ffcc;
      margin-top: 20px;
    }
    .tabs {
      display: flex;
      justify-content: center;
      margin: 20px 0;
      gap: 10px;
    }
    .tab {
      background: #111;
      border: 2px solid #00ffcc;
      color: #00ffcc;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.3s;
    }
    .tab.active {
      background: #00ffcc;
      color: #000;
      box-shadow: 0 0 15px #00ffcc;
    }
    .contenedor {
      max-width: 950px;
      margin: 20px auto;
      background: #121212;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 0 20px #00ffcc;
    }
    input, select, textarea {
      width: 90%;
      padding: 10px;
      margin: 8px 0;
      border: none;
      border-radius: 6px;
      background: #1e1e1e;
      color: #fff;
      font-size: 14px;
    }
    button {
      background: #00aaff;
      color: #fff;
      border: none;
      padding: 10px 20px;
      margin: 10px;
      border-radius: 6px;
      cursor: pointer;
      transition: 0.3s;
    }
    button:hover {
      background: #00ffcc;
      color: #000;
      box-shadow: 0 0 10px #00ffcc;
    }
    .dias {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 25px;
    }
    .dia {
      background: #1a1a1a;
      border: 2px solid #00ffcc;
      color: #00ffcc;
      width: 60px;
      height: 60px;
      margin: 8px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }
    .dia:hover {
      background: #00ffcc;
      color: #000;
      transform: scale(1.1);
    }
    .registro {
      background: #1e1e1e;
      margin: 15px 0;
      padding: 15px;
      border-radius: 8px;
      text-align: left;
      box-shadow: 0 0 10px #00ffcc;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }
    th, td {
      border: 1px solid #00ffcc;
      padding: 8px;
      text-align: center;
      color: #fff;
    }
    th {
      background: #00ffcc;
      color: #000;
    }
    .volver {
      margin-top: 30px;
      display: inline-block;
      color: #00ffcc;
      text-decoration: none;
      font-weight: bold;
      border: 2px solid #00ffcc;
      padding: 8px 20px;
      border-radius: 8px;
      transition: 0.3s;
    }
    .volver:hover {
      background: #00ffcc;
      color: #000;
    }
  </style>
</head>
<body>
  <h1>GESTIÓN DE RIESGO GPTRZ</h1>
  <div class="tabs">
    <div class="tab active" onclick="cambiarTab(this, 'general')">GENERAL</div>
    <div class="tab" onclick="cambiarTab(this, 'exnova')">EXNOVA</div>
    <div class="tab" onclick="cambiarTab(this, 'iqoption')">IQ OPTION</div>
  </div>

  <!-- Sección GENERAL -->
  <div class="contenedor" id="general">
    <h3>Configuraciones Generales</h3>
    <input id="capitalGeneral" type="number" placeholder="Capital inicial ($)">
    <input id="riesgoGeneral" type="number" placeholder="% Riesgo máximo">
    <p id="perdidaMax"></p>
  </div>

  <!-- Sección EXNOVA -->
  <div class="contenedor" id="exnova" style="display:none;">
    <h3>Registrar Operación - EXNOVA</h3>
    <input id="fechaExnova" type="date">
    <select id="parExnova">
      <option>EUR/USD</option>
      <option>GBP/JPY</option>
      <option>USD/JPY</option>
      <option>OTC</option>
    </select>
    <select id="tipoExnova">
      <option>CALL</option>
      <option>PUT</option>
    </select>
    <input id="resultadoExnova" type="text" placeholder="Resultado (ej: +1 / -1)">
    <input id="estrategiaExnova" type="text" placeholder="Estrategia usada">
    <textarea id="comentarioExnova" placeholder="Comentario"></textarea>
    <input id="capturaExnova" type="file" accept="image/*">
    <button onclick="guardarDia('exnova')">Guardar Día</button>
    <button onclick="exportarCSV('exnova')">Exportar CSV</button>
    <button onclick="limpiarHistorial('exnova')">Borrar Todo</button>

    <h3>Días Operados</h3>
    <div class="dias" id="diasExnova"></div>

    <h3>Historial del Día</h3>
    <div id="historialExnova"></div>
  </div>

  <!-- Sección IQ OPTION -->
  <div class="contenedor" id="iqoption" style="display:none;">
    <h3>Registrar Operación - IQ OPTION</h3>
    <input id="fechaIq" type="date">
    <select id="parIq">
      <option>EUR/USD</option>
      <option>GBP/JPY</option>
      <option>USD/JPY</option>
      <option>OTC</option>
    </select>
    <select id="tipoIq">
      <option>CALL</option>
      <option>PUT</option>
    </select>
    <input id="resultadoIq" type="text" placeholder="Resultado (ej: +1 / -1)">
    <input id="estrategiaIq" type="text" placeholder="Estrategia usada">
    <textarea id="comentarioIq" placeholder="Comentario"></textarea>
    <input id="capturaIq" type="file" accept="image/*">
    <button onclick="guardarDia('iqoption')">Guardar Día</button>
    <button onclick="exportarCSV('iqoption')">Exportar CSV</button>
    <button onclick="limpiarHistorial('iqoption')">Borrar Todo</button>

    <h3>Días Operados</h3>
    <div class="dias" id="diasIq"></div>

    <h3>Historial del Día</h3>
    <div id="historialIq"></div>
  </div>

  <a href="../index.html" class="volver">← VOLVER AL INICIO</a>
  <script>
    let pestañaActiva = "general"; // por defecto

    function cambiarTab(tab, nombre) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      pestañaActiva = nombre;

      // Mostrar solo la sección activa
      document.querySelectorAll('.contenedor').forEach(c => c.style.display = "none");
      document.getElementById(nombre).style.display = "block";

      if (nombre === "general") {
        calcularPerdida();
      } else {
        mostrarDias(nombre);
        document.getElementById("historial" + capitalizar(nombre)).innerHTML = "";
      }
    }

    function calcularPerdida() {
      const capital = document.getElementById("capitalGeneral").value;
      const riesgo = document.getElementById("riesgoGeneral").value;
      if (capital && riesgo) {
        const perdida = (capital * riesgo) / 100;
        document.getElementById("perdidaMax").innerText =
          "Máxima pérdida permitida: $" + perdida;
      } else {
        document.getElementById("perdidaMax").innerText = "";
      }
    }

    function guardarDia(nombre) {
      const fecha = document.getElementById("fecha" + capitalizar(nombre)).value;
      const par = document.getElementById("par" + capitalizar(nombre)).value;
      const tipo = document.getElementById("tipo" + capitalizar(nombre)).value;
      const resultado = document.getElementById("resultado" + capitalizar(nombre)).value;
      const estrategia = document.getElementById("estrategia" + capitalizar(nombre)).value;
      const comentario = document.getElementById("comentario" + capitalizar(nombre)).value;
      const captura = document.getElementById("captura" + capitalizar(nombre)).files[0];
      const dia = new Date().getDate();

      let registro = {
        fecha, par, tipo, resultado, estrategia, comentario,
        captura: captura ? URL.createObjectURL(captura) : null
      };

      let clave = "historial_" + nombre;
      let historial = JSON.parse(localStorage.getItem(clave)) || {};
      historial[dia] = historial[dia] || [];
      historial[dia].push(registro);
      localStorage.setItem(clave, JSON.stringify(historial));
      mostrarDias(nombre);
    }

    function mostrarDias(nombre) {
      let clave = "historial_" + nombre;
      let historial = JSON.parse(localStorage.getItem(clave)) || {};
      let contenedor = document.getElementById("dias" + capitalizar(nombre));
      contenedor.innerHTML = "";
      for (let i = 1; i <= 30; i++) {
        const diaDiv = document.createElement("div");
        diaDiv.className = "dia";
        diaDiv.textContent = i;
        if (historial[i]) {
          diaDiv.style.background = "#00ffcc";
          diaDiv.style.color = "#000";
        }
        diaDiv.onclick = () => mostrarHistorial(nombre, i);
        contenedor.appendChild(diaDiv);
      }
    }

    function mostrarHistorial(nombre, dia) {
      let clave = "historial_" + nombre;
      let historial = JSON.parse(localStorage.getItem(clave)) || {};
      let contenedor = document.getElementById("historial" + capitalizar(nombre));
      contenedor.innerHTML = "";
      if (!historial[dia]) {
        contenedor.innerHTML = "<p>No hay registros para este día.</p>";
        return;
      }
      historial[dia].forEach((reg, i) => {
        contenedor.innerHTML += `
          <div class="registro">
            <strong>${reg.fecha}</strong><br>
            Par: ${reg.par} | Tipo: ${reg.tipo} | Resultado: ${reg.resultado}<br>
            Estrategia: ${reg.estrategia}<br>
            Comentario: ${reg.comentario}<br>
            ${reg.captura ? `<img src="${reg.captura}" alt="Captura">` : ""}
          </div>
        `;
      });
    }

    function limpiarHistorial(nombre) {
      let clave = "historial_" + nombre;
      localStorage.removeItem(clave);
      mostrarDias(nombre);
      document.getElementById("historial" + capitalizar(nombre)).innerHTML = "";
    }

    function exportarCSV(nombre) {
      let clave = "historial_" + nombre;
      let historial = JSON.parse(localStorage.getItem(clave)) || {};
      let csv = "Día,Fecha,Par,Tipo,Resultado,Estrategia,Comentario\n";
      for (let dia in historial) {
        historial[dia].forEach(reg => {
          csv += `${dia},${reg.fecha},${reg.par},${reg.tipo},${reg.resultado},${reg.estrategia},${reg.comentario}\n`;
        });
      }
      const blob = new Blob([csv], { type: "text/csv" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "gestion_riesgo_" + nombre + ".csv";
      a.click();
    }

    function capitalizar(texto) {
      return texto.charAt(0).toUpperCase() + texto.slice(1);
    }

    window.onload = () => {
      cambiarTab(document.querySelector('.tab.active'), 'general');
    };
  </script>
</body>
</html>
