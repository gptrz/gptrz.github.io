<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Gestión de Riesgo - GPTRZ</title>
  <link rel="stylesheet" href="../style.css">
  <style>
    body {
      background-color: #0a0a0a;
      color: #00ffcc;
      font-family: Arial, sans-serif;
      text-align: center;
    }
    .contenedor {
      max-width: 800px;
      margin: 40px auto;
      background: #111;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 15px #00ffcc;
    }
    input, textarea {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
      border: none;
      border-radius: 5px;
      background: #222;
      color: #fff;
    }
    button {
      background: #00aaff;
      color: #fff;
      border: none;
      padding: 10px 20px;
      margin: 10px;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover {
      background: #00ffcc;
      color: #000;
    }
    .registro {
      background: #222;
      margin: 15px 0;
      padding: 15px;
      border-radius: 8px;
      text-align: left;
    }
    img {
      max-width: 200px;
      margin-top: 10px;
      border: 2px solid #00ffcc;
      border-radius: 5px;
    }
  </style>
</head>
<body>
  <h1>Gestión de Riesgo</h1>
  <div class="contenedor">
    <h3>Registrar Operación</h3>
    <input id="capital" type="number" placeholder="Capital total ($)">
    <input id="riesgo" type="number" placeholder="Riesgo máximo (%)">
    <input id="resultado" type="text" placeholder="Resultado (ej: 3-1)">
    <textarea id="observaciones" placeholder="Escribe qué falló o qué salió bien"></textarea>
    <input id="captura" type="file" accept="image/*">
    <button onclick="guardarRegistro()">Guardar</button>
    <button onclick="limpiarHistorial()">Borrar Todo</button>
    <h3>Historial</h3>
    <div id="historial"></div>
  </div>

  <script>
    function guardarRegistro() {
      const capital = document.getElementById("capital").value;
      const riesgo = document.getElementById("riesgo").value;
      const resultado = document.getElementById("resultado").value;
      const observaciones = document.getElementById("observaciones").value;
      const captura = document.getElementById("captura").files[0];
      const fecha = new Date().toLocaleDateString();

      let registro = {
        fecha,
        capital,
        riesgo,
        resultado,
        observaciones,
        captura: captura ? URL.createObjectURL(captura) : null
      };

      let historial = JSON.parse(localStorage.getItem("historial")) || [];
      historial.push(registro);
      localStorage.setItem("historial", JSON.stringify(historial));
      mostrarHistorial();
    }

    function mostrarHistorial() {
      let historial = JSON.parse(localStorage.getItem("historial")) || [];
      let contenedor = document.getElementById("historial");
      contenedor.innerHTML = "";
      historial.forEach((reg, i) => {
        contenedor.innerHTML += `
          <div class="registro">
            <strong>${reg.fecha}</strong><br>
            Capital: $${reg.capital} | Riesgo: ${reg.riesgo}%<br>
            Resultado: ${reg.resultado}<br>
            Observaciones: ${reg.observaciones}<br>
            ${reg.captura ? `<img src="${reg.captura}" alt="Captura">` : ""}
            <br><button onclick="borrarRegistro(${i})">Borrar</button>
          </div>
        `;
      });
    }

    function borrarRegistro(i) {
      let historial = JSON.parse(localStorage.getItem("historial")) || [];
      historial.splice(i, 1);
      localStorage.setItem("historial", JSON.stringify(historial));
      mostrarHistorial();
    }

    function limpiarHistorial() {
      localStorage.removeItem("historial");
      mostrarHistorial();
    }

    window.onload = mostrarHistorial;
  </script>
</body>
</html>
