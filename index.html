<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Interés Compuesto GPTRZ</title>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; margin-top: 40px; }
    h1 { color: darkgreen; }
    input, button { padding: 10px; margin: 5px; font-size: 16px; }
    table { margin: 20px auto; border-collapse: collapse; width: 80%; }
    th, td { border: 1px solid #ccc; padding: 8px; }
    th { background: #f0f0f0; }
  </style>
</head>
<body>
  <h1>📈 Calculadora de Interés Compuesto GPTRZ</h1>
  
  <p>Capital inicial: <input type="number" id="capital" value="100"></p>
  <p>Porcentaje (%): <input type="number" id="porcentaje" value="5"></p>
  <p>Períodos: <input type="number" id="periodos" value="12"></p>
  <p>Niveles: <input type="number" id="niveles" value="1"></p>
  
  <button onclick="calcular()">Calcular</button>
  
  <div id="resultado"></div>
  
  <script>
    function calcular() {
      const capital = parseFloat(document.getElementById('capital').value);
      const porcentaje = parseFloat(document.getElementById('porcentaje').value) / 100;
      const periodos = parseInt(document.getElementById('periodos').value);
      const niveles = parseInt(document.getElementById('niveles').value);
      
      let tabla = "<table><tr><th>Nivel</th><th>Capital</th><th>Ganancia</th><th>Total</th></tr>";
      let acumulado = capital;
      
      for (let i = 1; i <= periodos; i++) {
        let ganancia = acumulado * porcentaje;
        acumulado += ganancia;
        
        if (i % niveles === 0) {
          tabla += `<tr><td>${i}</td><td>${capital.toFixed(2)}</td><td>${ganancia.toFixed(2)}</td><td>${acumulado.toFixed(2)}</td></tr>`;
        }
      }
      
      tabla += "</table>";
      document.getElementById('resultado').innerHTML = tabla;
    }
  </script>
</body>
</html>
