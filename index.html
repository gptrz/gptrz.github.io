<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Sorteo GPTRZ</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #006400, #228B22);
      color: #fff;
      text-align: center;
      margin: 0;
      padding: 0;
    }
    header {
      background-color: #004d00;
      padding: 20px;
      font-size: 28px;
      font-weight: bold;
      color: gold;
    }
    section {
      margin: 40px auto;
      max-width: 600px;
      background: rgba(0,0,0,0.3);
      padding: 20px;
      border-radius: 10px;
    }
    button {
      background: gold;
      color: #004d00;
      padding: 12px 24px;
      font-size: 18px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 20px;
    }
    button:hover {
      background: #ffd700;
    }
    #resultado {
      font-size: 22px;
      margin-top: 20px;
      font-weight: bold;
      color: gold;
    }
    footer {
      background-color: #004d00;
      padding: 10px;
      font-size: 14px;
      color: #ccc;
    }
  </style>
</head>
<body>
  <header>🎉 Sorteo GPTRZ 🎉</header>

  <section>
    <h2>Tu nombre puede ser el siguiente ganador</h2>
    <p>Participa ahora para tener la oportunidad de ganar premios exclusivos.</p>
    <button onclick="sortear()">Sortear</button>
    <p id="resultado"></p>
  </section>

  <section>
    <h3>Premio especial</h3>
    <p>Un premio sorpresa para el ganador del mes.</p>
    <p><strong>Participantes:</strong> <span id="contador">0</span></p>
    <p><strong>Fecha del sorteo:</strong> 25 Mayo 2026</p>
  </section>

  <footer>© 2026 GPTRZ. Todos los derechos reservados.</footer>

  <script>
    let nombres = [];

    // Cargar el archivo TXT
    fetch('nombres.txt')
      .then(response => response.text())
      .then(texto => {
        nombres = texto.split('\n').map(n => n.trim()).filter(n => n.length > 0);
        document.getElementById('contador').textContent = nombres.length;
      });

    // Función para sortear
    function sortear() {
      if (nombres.length === 0) {
        document.getElementById('resultado').textContent = "No hay nombres cargados.";
        return;
      }
      const ganador = nombres[Math.floor(Math.random() * nombres.length)];
      document.getElementById('resultado').textContent = "🎊 El ganador es: " + ganador + " 🎊";
    }
  </script>
</body>
</html>
